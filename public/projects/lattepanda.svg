<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#111111"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222222" stroke-width="1"/>
  </pattern>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Abstract Chip/Board representation -->
  <rect x="250" y="150" width="300" height="300" rx="10" fill="#1a1a1a" stroke="#ff6b00" stroke-width="2"/>
  <rect x="280" y="180" width="80" height="80" fill="#2a2a2a"/>
  <rect x="380" y="180" width="140" height="80" fill="#2a2a2a"/>
  <rect x="280" y="280" width="240" height="140" fill="#2a2a2a"/>
  
  <!-- Glowing traces -->
  <path d="M 250 300 L 150 300 L 150 450" stroke="#ff6b00" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="150" cy="450" r="4" fill="#ff6b00"/>
  
  <path d="M 550 200 L 650 200 L 650 100" stroke="#ff6b00" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="650" cy="100" r="4" fill="#ff6b00"/>
  
  <rect x="0" y="0" width="800" height="600" fill="#000000" opacity="0.3"/>
</svg>
